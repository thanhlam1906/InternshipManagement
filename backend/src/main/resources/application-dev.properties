# ============================================================
# DEV PROFILE — chi dung khi phat trien local
# Kich hoat: SPRING_PROFILES_ACTIVE=dev
# ============================================================

# Dev database (PostgreSQL local)
spring.datasource.url=jdbc:postgresql://localhost:5432/internship-management-db
spring.datasource.username=postgres
spring.datasource.password=1234

# Tu dong tao/update schema trong dev (KHONG dung cho production)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# DevTools
spring.devtools.restart.enabled=true
spring.devtools.livereload.enabled=true

# JWT secret cho dev (chi dung local, KHONG dung cho prod)
jwt.secret=YWJjZGVmZ2hpamtsbW5vcHFyc3R1dnd4eXoxMjM0NTY3ODkwYWJjZGVmZ2hpamtsbW5vcHFy

# Logging chi tiet cho dev
logging.level.com.example.internshipmanagement=DEBUG
logging.level.org.springframework.security=DEBUG

# ============================================================
# Google OAuth2 - Dev Local
# De test dang nhap Google tren local:
#   1. Set env vars: GOOGLE_CLIENT_ID va GOOGLE_CLIENT_SECRET
#   2. Dam bao Google Cloud Console co redirect URI:
#      http://localhost:8080/login/oauth2/code/google
# Khi chua set env vars, OAuth2 van KHONG bi loi (dung placeholder).
# ============================================================
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:dev-placeholder}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:dev-placeholder}
spring.security.oauth2.client.registration.google.scope=profile,email
