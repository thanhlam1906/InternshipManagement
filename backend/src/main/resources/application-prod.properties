# ============================================================
# PROD PROFILE — mac dinh khi khong set SPRING_PROFILES_ACTIVE
# ============================================================

# Production mac dinh dung 'validate'. Co the override qua env JPA_DDL_AUTO (vd: update cho lan deploy dau tien)
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:validate}

# Render PostgreSQL requires SSL
spring.datasource.hikari.data-source-properties.sslmode=require
spring.jpa.show-sql=false

# JWT — bat buoc phai set JWT_SECRET trong production
jwt.secret=${JWT_SECRET}

# Tat DevTools trong production
spring.devtools.restart.enabled=false
spring.devtools.livereload.enabled=false

# Logging toi thieu
logging.level.com.example.internshipmanagement=INFO
logging.level.org.springframework.security=WARN

# Gioi han request size
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=11MB
