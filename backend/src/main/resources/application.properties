spring.application.name=Internship-Management
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/internship-management-db}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:1234}
#JPA / HIBERNATE
# WARNING: Never use 'update' or 'create-drop' in production. Use 'validate' instead.
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.show-sql=false
#Logging
#Active Profile
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}
#DevTools
spring.devtools.restart.enabled=true
spring.devtools.livereload.enabled=true
#JWT
jwt.secret=${JWT_SECRET:YWJjZGVmZ2hpamtsbW5vcHFyc3R1dnd4eXoxMjM0NTY3ODkwYWJjZGVmZ2hpamtsbW5vcHFy}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}
# Cache Configuration (Caffeine)
spring.cache.type=caffeine
spring.cache.caffeine.spec=maximumSize=1000,expireAfterWrite=10m
#Multipart File Upload (CV Review)
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=11MB
#External API - JSearch (OpenWebNinja Direct)
external-api.jsearch.base-url=${JSEARCH_BASE_URL:https://api.openwebninja.com}
external-api.jsearch.api-key=${JSEARCH_API_KEY:ak_9ev57e5f3vj90ixncdte5qechb1kgmk9377nooo2ajclc35}
#External API - Google Gemini AI
external-api.gemini.base-url=${GEMINI_BASE_URL:https://generativelanguage.googleapis.com/v1beta}
external-api.gemini.model=${GEMINI_MODEL:gemini-2.0-flash}
#External API - Groq (OpenAI-compatible - free tier)
external-api.groq.base-url=${GROQ_BASE_URL:https://api.groq.com/openai}
external-api.groq.model=${GROQ_MODEL:llama-3.3-70b-versatile}