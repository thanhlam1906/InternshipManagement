spring.application.name=Internship-Management

# ============================================================
# DATABASE — phai set env var DB_URL, DB_USERNAME, DB_PASSWORD
# ============================================================
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

#JPA / HIBERNATE
# Production mac dinh dung 'validate'. Dev profile se override thanh 'update'.
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:validate}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.batch_size=25
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.show-sql=false

#Active Profile — mac dinh la prod. Dev: set SPRING_PROFILES_ACTIVE=dev
spring.profiles.active=${SPRING_PROFILES_ACTIVE:prod}

# ============================================================
# JWT — production phai set env var JWT_SECRET
# ============================================================
jwt.secret=${JWT_SECRET:}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# ============================================================
# Default Admin Account tu dong tao khi app startup
# Set ADMIN_PASSWORD de kich hoat. Bo trong de bo qua.
# ============================================================
app.admin.username=${ADMIN_USERNAME:admin}
app.admin.password=${ADMIN_PASSWORD:}
app.admin.email=${ADMIN_EMAIL:admin@internship.local}

# Cache Configuration (Caffeine)
spring.cache.type=caffeine
spring.cache.caffeine.spec=maximumSize=1000,expireAfterWrite=10m

#Multipart File Upload (CV Review)
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=11MB

#External API - JSearch (OpenWebNinja Direct)
external-api.jsearch.base-url=${JSEARCH_BASE_URL:https://api.openwebninja.com}
external-api.jsearch.api-key=${JSEARCH_API_KEY:}

#External API - Google Gemini AI
external-api.gemini.base-url=${GEMINI_BASE_URL:https://generativelanguage.googleapis.com/v1beta}
external-api.gemini.model=${GEMINI_MODEL:gemini-2.0-flash}
external-api.gemini.api-key=${GEMINI_API_KEY:}

#External API - Groq (OpenAI-compatible - free tier)
external-api.groq.base-url=${GROQ_BASE_URL:https://api.groq.com/openai}
external-api.groq.model=${GROQ_MODEL:llama-3.3-70b-versatile}
external-api.groq.api-key=${GROQ_API_KEY:}

# ============================================================
# Google OAuth2 Login
# De bat tinh nang dang nhap Google:
#   1. Tao OAuth2 Client ID trong Google Cloud Console
#      (APIs & Services > Credentials > Create OAuth client ID)
#   2. Them authorized redirect URI: {BACKEND_URL}/login/oauth2/code/google
#      VD: https://internship-management-j5sh.onrender.com/login/oauth2/code/google
#   3. Set cac bien moi truong tren Render:
#      GOOGLE_CLIENT_ID=your-client-id.apps.googleusercontent.com
#      GOOGLE_CLIENT_SECRET=GOCSPX-your-client-secret
#      OAUTH2_REDIRECT_URI=https://internship-management-j5sh.onrender.com/oauth2/callback
#
# Khi GOOGLE_CLIENT_ID chua duoc set, OAuth2 beans se khong duoc tao
# va tinh nang dang nhap Google se tu dong bi vo hieu hoa.
# ============================================================

# Spring Security OAuth2 Client — Google
# Spring Boot tu dong cau hinh Google provider thong qua CommonOAuth2Provider
# Chi can set client-id + client-secret la du
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:}
spring.security.oauth2.client.registration.google.scope=profile,email

app.oauth2.redirect-uri=${OAUTH2_REDIRECT_URI:http://localhost:5173/oauth2/callback}
