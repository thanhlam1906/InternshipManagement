name: Keep Render Alive

# Ping Render service every 10 minutes so the free tier never spins down.
# Render free tier goes to sleep after 15 min of no traffic.

on:
  schedule:
    - cron: '*/10 * * * *'   # every 10 minutes — well within the 15-min window

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render service
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://internship-management-j5sh.onrender.com)
          echo "HTTP status: $STATUS"
          if [ "$STATUS" -ge 200 ] && [ "$STATUS" -lt 500 ]; then
            echo "✅ Render is alive"
          else
            echo "⚠️  Render returned $STATUS"
          fi
