services:
  - type: web
    name: internship-management
    runtime: docker
    plan: free
    region: singapore
    healthCheckPath: /
    envVars:
      # --- Spring profile ---
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      # JPA: 'update' — tu dong tao/them bang khi entity thay doi,
      # khong xoa data hay drop column. An toan de giu vinh vien.
      - key: JPA_DDL_AUTO
        value: update
      # --- Supabase PostgreSQL ---
      - key: DB_URL
        value: jdbc:postgresql://aws-1-ap-south-1.pooler.supabase.com:6543/postgres?sslmode=require&prepareThreshold=0
      - key: DB_USERNAME
        value: postgres.tsrutjqagdghcqexlkrf
      - key: DB_PASSWORD
        sync: false
      # --- JWT secret — Render tu sinh ra ---
      - key: JWT_SECRET
        generateValue: true
      # --- OAuth2 redirect (update lại khi deploy xong) ---
      - key: OAUTH2_REDIRECT_URI
        value: http://localhost:5173/oauth2/callback
