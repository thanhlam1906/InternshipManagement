services:
  - type: web
    name: internship-management
    runtime: docker
    plan: free
    region: singapore
    healthCheckPath: /api/auth/login
    envVars:
      # --- Spring profile ---
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      # JPA: 'update' cho lan deploy dau tien de tao bang.
      # Sau khi bang da tao xong, chuyen thanh 'validate' de an toan.
      - key: JPA_DDL_AUTO
        value: update
      # --- Supabase PostgreSQL ---
      # Format: jdbc:postgresql://db.<your-project>.supabase.co:5432/postgres
      - key: DB_URL
        sync: false
      - key: DB_USERNAME
        value: postgres
      - key: DB_PASSWORD
        sync: false
      # --- JWT secret — Render tu sinh ra ---
      - key: JWT_SECRET
        generateValue: true
      # --- OAuth2 redirect (update lại khi deploy xong) ---
      - key: OAUTH2_REDIRECT_URI
        value: http://localhost:5173/oauth2/callback
