services:
  - type: web
    name: internship-management
    runtime: docker
    plan: free
    region: singapore
    healthCheckPath: /api/auth/login
    envVars:
      # --- Spring profile ---
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      # JPA: 'update' cho lan deploy dau tien de tao bang.
      # Sau khi bang da tao xong, chuyen thanh 'validate' de an toan.
      - key: JPA_DDL_AUTO
        value: update
      # --- Database — tu dong lay tu Render PostgreSQL service ---
      - key: DB_URL
        fromDatabase:
          name: internship-db
          property: connectionString
      - key: DB_USERNAME
        fromDatabase:
          name: internship-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: internship-db
          property: password
      # --- JWT secret — Render tu sinh ra ---
      - key: JWT_SECRET
        generateValue: true
      # --- OAuth2 redirect (can update later) ---
      - key: OAUTH2_REDIRECT_URI
        value: http://localhost:5173/oauth2/callback

databases:
  - name: internship-db
    plan: free
